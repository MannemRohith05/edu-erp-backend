# Application Configuration
spring.application.name=edu-erp-backend
server.port=${PORT:8080}

# Database Configuration (H2 for Development)
spring.datasource.url=jdbc:h2:mem:eduerp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT Configuration
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong123456789
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.com.eduerp=INFO
logging.level.org.springframework.security=INFO

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://localhost:5173}
