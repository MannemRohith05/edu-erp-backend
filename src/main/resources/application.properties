# Application Configuration
spring.application.name=edu-erp-backend
server.port=${PORT:8080}

# ─── Database Configuration ──────────────────────────────────────────────────
# On Railway: set MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Locally: falls back to H2 in-memory
spring.datasource.url=${MYSQL_URL:jdbc:h2:mem:eduerp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# H2 Console (only useful locally)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ─── JPA Configuration ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ─── JWT Configuration ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ─── SMTP Configuration ──────────────────────────────────────────────────────
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}
app.mail.from=${SMTP_FROM:${spring.mail.username:}}

# ─── OTP Configuration ───────────────────────────────────────────────────────
app.auth.otp.length=${APP_AUTH_OTP_LENGTH:6}
app.auth.otp.expiration-minutes=${APP_AUTH_OTP_EXPIRATION_MINUTES:5}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.eduerp=INFO
logging.level.org.springframework.security=INFO

# ─── API Documentation ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── CORS ────────────────────────────────────────────────────────────────────
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://localhost:5173}
